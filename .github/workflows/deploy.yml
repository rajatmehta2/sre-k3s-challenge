name: Deploy To K3s

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: azure/setup-kubectl@v4

    - name: Configure kubeconfig
      run: |

        mkdir -p ~/.kube

        echo "${{ secrets.KUBECONFIG_DATA }}" \
        | base64 -d > ~/.kube/config

    - run: kubectl apply -f kubernetes/
